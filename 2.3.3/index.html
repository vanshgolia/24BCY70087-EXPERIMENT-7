<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exp 2.3.3 — Live Chat Simulator</title>
<link rel="stylesheet" href="../lab.css">

<style>
  .chat-shell { display:grid; grid-template-columns:200px 1fr; border-radius:16px; overflow:hidden; border:1px solid rgba(255,255,255,.08); }
  .left-panel { background:rgba(255,255,255,.02); padding:14px; border-right:1px solid rgba(255,255,255,.08); }
  .left-panel h4 { font-size:.75rem; color:#64748b; margin-bottom:10px; }

  .user-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .avatar { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.7rem; color:#fff; }

  .chat-area { display:flex; flex-direction:column; }
  .chat-top { padding:12px; border-bottom:1px solid rgba(255,255,255,.06); display:flex; justify-content:space-between; }
  .status { font-size:.7rem; background:rgba(52,211,153,.1); padding:2px 6px; border-radius:10px; color:#34d399; }

  .chat-box { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; max-height:260px; }
  .bubble { padding:8px 12px; border-radius:10px; font-size:.82rem; max-width:70%; }
  .me { align-self:flex-end; background:rgba(99,102,241,.3); }
  .other { align-self:flex-start; background:rgba(255,255,255,.07); }

  .typing { font-size:.75rem; color:#64748b; padding:4px 12px; }

  .input-zone { display:flex; gap:6px; padding:10px; border-top:1px solid rgba(255,255,255,.06); }
  .input-zone input { flex:1; padding:8px; border-radius:8px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.05); color:#fff; }
  .send { padding:8px 14px; border:none; border-radius:8px; background:#6366f1; color:#fff; cursor:pointer; }

  .overlay { position:absolute; inset:0; background:rgba(0,0,0,.85); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; }
</style>
</head>

<body>
<div class="lab-container">
<a href="../index.html" class="back-btn">← Back</a>

<div class="lab-header">
  <div class="exp-badge">Exp 2.3.3</div>
  <h1>Live Chat Simulator</h1>
  <p>Typing effects, bots & real-time UI simulation</p>
</div>

<div class="lab-card" style="position:relative">

<div class="overlay" id="joinBox">
  <h2 style="color:#fff">Enter Chat</h2>
  <input id="nameInput" placeholder="Username..." class="lab-input" style="width:240px">
  <button class="lab-btn" onclick="enterChat()">Join</button>
</div>

<div class="chat-shell">

  <div class="left-panel">
    <h4>Users (<span id="count">0</span>)</h4>
    <div id="users"></div>
  </div>

  <div class="chat-area">
    <div class="chat-top">
      <span>Global Room</span>
      <span class="status" id="conn">Disconnected</span>
    </div>

    <div class="chat-box" id="chatBox"></div>
    <div class="typing" id="typing"></div>

    <div class="input-zone">
      <input id="msg" placeholder="Type message..." onkeydown="keySend(event)">
      <button class="send" onclick="send()">Send</button>
    </div>
  </div>

</div>
</div>
</div>

<script>
const botNames = ["Neo","Zara","Leo"];
const botTexts = ["Hello 👋","Nice UI","Working great","Cool project","Love this!"];

let me = "", users = [];

function enterChat(){
  const val = document.getElementById("nameInput").value.trim();
  if(!val) return;
  me = val;
  users = [me];
  document.getElementById("joinBox").style.display="none";
  document.getElementById("conn").textContent="Connected";

  setTimeout(()=>addBot("Neo"),1000);
  setTimeout(()=>addBot("Zara"),2500);

  renderUsers();
  startBots();
}

function addBot(n){
  users.push(n);
  renderUsers();
  sysMsg(n+" joined");
}

function renderUsers(){
  document.getElementById("count").textContent = users.length;
  document.getElementById("users").innerHTML = users.map(u =>
    `<div class="user-row">
      <div class="avatar" style="background:#6366f1">${u[0]}</div>
      <span>${u}</span>
    </div>`
  ).join('');
}

function msg(text, own){
  const el = document.createElement("div");
  el.className = "bubble " + (own?"me":"other");
  el.textContent = text;
  document.getElementById("chatBox").appendChild(el);
}

function sysMsg(t){
  const el = document.createElement("div");
  el.style.textAlign="center";
  el.style.fontSize="0.7rem";
  el.style.color="#888";
  el.textContent=t;
  document.getElementById("chatBox").appendChild(el);
}

function send(){
  const input = document.getElementById("msg");
  if(!input.value) return;
  msg(input.value,true);
  input.value="";
}

function keySend(e){ if(e.key==="Enter") send(); }

function startBots(){
  setInterval(()=>{
    const bot = users[Math.floor(Math.random()*users.length)];
    if(bot===me) return;

    document.getElementById("typing").textContent = bot+" typing...";
    setTimeout(()=>{
      document.getElementById("typing").textContent="";
      msg(botTexts[Math.floor(Math.random()*botTexts.length)],false);
    },800);

  },4000);
}
</script>
</body>
</html>
